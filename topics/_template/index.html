<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【図解】テーマタイトルをここに - USCPA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .header-gradient {
      background: linear-gradient(90deg, hsl(200, 70%, 38%), hsl(168, 55%, 38%));
    }
    .section-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .term-explain {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border-left: 4px solid #16a34a;
      padding: 1.5rem;
      border-radius: 0.75rem;
      margin: 1.5rem 0;
    }
    .char-bubble { position: relative; padding: 1.5rem; border-radius: 1rem; margin-left: 0.5rem; }
    .char-bubble::before {
      content: ''; position: absolute; left: -10px; top: 20px;
      border-width: 10px; border-style: solid;
    }
    .student-bubble {
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
      border: 2px solid #ea580c;
    }
    .student-bubble::before { border-color: transparent #ea580c transparent transparent; }
    .coach-bubble {
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 2px solid #2563eb;
    }
    .coach-bubble::before { border-color: transparent #2563eb transparent transparent; }
  </style>
</head>
<body class="bg-slate-50">
  <header class="header-gradient text-white py-8">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl md:text-4xl font-bold">【図解】テーマタイトル（編集）</h1>
      <p class="mt-2 opacity-90">サブタイトル一行（試験上の位置づけ）</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="section-card">
      <div class="flex items-start gap-4 mb-6">
        <div class="w-14 h-14 rounded-full bg-orange-100 flex items-center justify-center flex-shrink-0 border-2 border-orange-300">
          <i data-lucide="user" class="w-7 h-7 text-orange-700"></i>
        </div>
        <div class="char-bubble student-bubble flex-1">
          <p class="text-sm font-bold text-orange-800 mb-1">受講生</p>
          <p>（つまずき・疑問）</p>
        </div>
      </div>
      <div class="flex items-start gap-4">
        <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0 border-2 border-blue-300">
          <i data-lucide="graduation-cap" class="w-7 h-7 text-blue-800"></i>
        </div>
        <div class="char-bubble coach-bubble flex-1">
          <p class="text-sm font-bold text-blue-800 mb-1">コーチ</p>
          <p>（今日のゴール）</p>
        </div>
      </div>
    </div>

    <div class="section-card">
      <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
        <i data-lucide="star" class="w-6 h-6 text-amber-500"></i>
        まず覚える3つ
      </h2>
      <ol class="list-decimal list-inside space-y-2 text-slate-700">
        <li>…</li>
        <li>…</li>
        <li>…</li>
      </ol>
    </div>

    <div class="section-card">
      <h2 class="text-xl font-bold text-slate-800 mb-4">用語ボックス</h2>
      <div class="term-explain">
        <p class="text-slate-700">平易語での言い換えを書く。</p>
      </div>
    </div>

    <div class="section-card">
      <h2 class="text-xl font-bold text-slate-800 mb-4">演習で見るポイント</h2>
      <ul class="list-disc list-inside text-slate-600 space-y-1">
        <li>…</li>
      </ul>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
