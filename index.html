<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USCPA 図解インデックス</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8">
  <div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-800 mb-2">図解一覧</h1>
    <p class="text-slate-600 text-sm mb-6">各テーマは <code class="bg-slate-200 px-1 rounded">topics/&lt;テーマID&gt;/index.html</code> に配置してください。</p>
    <ul class="list-disc list-inside text-slate-700 space-y-2">
      <li>新規は <code class="bg-slate-200 px-1 rounded">topics/_template</code> をコピーしてフォルダ名だけ変える。</li>
      <li>配信設定は別リポジトリの <code class="bg-slate-200 px-1 rounded">posts.json</code> を編集。</li>
    </ul>
  </div>
</body>
</html>
